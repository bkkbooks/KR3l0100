body:
  text: 卷三程咸程咸字咸休其母始懷咸夢老公投藥與之服此當生貴子晉武帝時歷位至侍中有名于世流星墮甕袁真在豫州遣女妓紀陵送阿薛阿郭阿馬三妓與桓宣武既至經時三人半夜共出庭前月下觀望有銅瓮水在其側忽見一流星夜從天直墮瓮中驚喜共視忽如二寸火珠流於水底炯然明淨乃相謂曰此吉祥也當誰應之于是薛郭二人更以瓢杓接取並不得阿馬最後取星正入瓢中便飲之既而若有感焉俄而懷桓玄玄雖篡位不終而數年之中榮貴極矣掘頭船臨淮公荀序字休玄母華夫人憐愛過常年十歲從南臨歸經青草湖時正帆風駛序出塞郭忽落水比得下帆已行數十里洪波淼漫母撫膺遠望少頃見一掘頭船漁父以楫棹船如飛載序還之云送府君還荀後位至常伯長沙相故云府君也禾滿廬陵巴邱人文晁者世以田作為業年常田數十頃家漸富晉太元初秋收已過刈獲都畢明旦至田禾悉復滿湛然如初即便更獲所獲盈倉于此遂為巨富錢孽上虞魏全家在縣北忽有一人著孝子服皂笠手巾掩口來詣全家語曰君有錢一千萬銅器亦如之大柳樹錢在其下取錢當得爾於君家大不吉僕尋為君取此便去自爾出三十年遂不復來全家亦不取錢蜜蜂螫賊元嘉元年建安郡山賊百餘人破郡治抄掠百姓資產子女遂入佛圖搜掠財寶先是諸供養具別封置一室賊破戶忽有蜜蜂數萬頭從衣簏出同時噬螫群賊身百腫痛眼皆盲合先諸所掠皆棄而走隕盜蔡裔有勇氣聲若雷震嘗有二偷兒入室裔拊床一呼二盜俱隕馬溺消瘕昔有一人與奴同時得腹瘕病治不能愈奴既死乃剖腹視之得一白鱉赤眼甚鮮明乃試以諸毒藥澆灌之并內藥于鱉口悉無所動乃係鱉于床腳忽有一客來看之乘一白馬既而馬尿濺鱉鱉乃惶駭欲疾走避溺因繫之不得去乃縮藏頭頸足焉病者察之謂其子曰吾病或可以救矣乃試取白馬尿以灌鱉上須臾便消成數升水病者乃頓服升餘白馬溺病豁然愈蕨莖化蛇太尉郗鑑字道徽鎮丹徒曾出獵時二月中蕨始生有一甲士折食一莖即覺心中淡淡欲吐因歸乃成心腹疼痛經半年許忽大吐吐出一赤蛇長尺餘尚活動搖乃挂著屋檐前汁稍稍出蛇漸焦小經一宿視之乃是一莖蕨猶昔之所食病遂除差斛二瘕桓宣武時有一督將因時行病後虛熱更渴飲複茗必一斛二斗乃飽纔減升合便以為不足非復一日家貧後有客造之正遇其飲復茗亦先聞世有此病仍令更進五升乃大吐有一物出如升大有口形質縮縐狀如牛肚客乃令置之于盆中以一斛二斗復茗澆之此物歙之都盡而止覺小脹又加五升便悉混然從口中涌出既吐此物其病遂差或問之此何病答云此病名斛二瘕桓梅同夢桓哲字明期居豫章時梅元龍為太守先已病矣哲往省之語梅云吾昨夜忽夢見作卒迎卿來作泰山府君梅聞之愕然曰吾亦夢見卿為卒著喪衣來迎我經數日復同夢如前云二十八日當拜至二十七日晡時桓忽中惡腹滿就梅索麝香丸梅聞便令作凶具二十七日桓便亡二十八日而梅卒華歆當公平原華歆字子魚為諸生時常宿人門外主人婦夜產有頃兩吏來詣其門便相向辟易欲退卻相謂曰公在此因踟躕良久一吏曰籍當定奈何得住乃前向子魚拜相將入出并行共語曰當與几歲一人云當與三歲天明子魚去後欲驗其事至三歲故往視兒消息果三歲已死乃自喜曰我固當公後果為太尉形魂離異宋時有一人忘其姓氏與婦同寢天曉婦起出後其夫尋亦出外婦還見其夫猶在被中眠須臾奴子自外來云郎求鏡婦以奴詐乃指床上以示奴奴云適從郎間來于是白馳其夫夫大愕便入與婦共視被中人高枕安寢正是其形了無一異慮是其神魂不敢驚動乃其以手徐徐撫床遂冉冉入席而滅夫婦心怖不已少時夫忽得疾性理乖錯終身不愈董壽之董壽之被誅其家尚未知妻夜坐忽見壽之居其側嘆息不已妻問夜間何得而歸壽之都不應答有頃出門繞雞籠而行籠中雞驚叫妻疑有異持火出戶視之見血數升而壽之失所在遂以告姑因與大小號哭知有變及晨果得凶問魂車木馬宋時有諸生遠學其父母燃火夜作兒忽至前嘆息曰今我但魂爾非復生人父母問之兒曰此月初病以今日某時亡今在琅邪任子成家明日當殮來迎父母父母曰去此千里雖復顛倒那得及汝兒曰外有車乘但乘之自得至矣父母從之上車忽若睡比雞鳴已至所在視其駕乘但魂車木馬遂與主人相見臨兒悲哀問其疾消息如言
