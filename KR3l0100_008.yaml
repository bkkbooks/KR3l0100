body:
  text: 卷八二人著烏衣王機為廣州刺史入廁忽見二人著烏衣與機相捍良久擒之得二物如烏鴨以問鮑靚靚曰此物不祥機焚之徑飛上天尋誅死火變蝴蝶晉義熙中烏傷葛輝夫在婦家宿三更後有兩人把火至階前疑是凶人往打之欲下杖悉變成蝴蝶繽紛飛散有衝輝夫腋下便倒地少時死諸葛長民諸葛長民富貴後常一月中輒十數夜眠中驚起跳踉如與人相打毛修之嘗與同宿見之驚愕問其故答曰正見一物甚黑而有毛腳不分明奇健非我無以制之也後來轉數屋中柱及椽桷間悉見有蛇頭令人以刃懸斫應刃隱藏去輒復出又搗衣杵相與語如人聲不可解於壁見有巨手長七八尺臂大數圍令斫之忽然不見未几伏誅死人頭新野庾謹母病兄弟三人悉在侍疾白日常燃火忽見帳帶自卷自舒如此數四須臾間床前聞狗聲異常舉家共視了不見狗見一死人頭在地頭猶有發兩眼尚動甚可憎惡其家怖懼乃不持出門即於後園中瘞之明日往視乃出土上兩眼猶爾即又埋之後日復出乃以磚頭合埋之遂不復出他日其母便亡人頭墮王綏字彥猷其家夜中梁上無故有人頭墮于床而流血滂沱俄拜荊州刺史坐父愈之謀與弟納並被誅髑髏百頭晉永嘉五年張榮為高平戍邏主時曹嶷賊寇離亂人民皆塢壘自保固見山中火起飛埃絶焰十餘丈樹顛火焱響動山谷又聞人馬鎧甲聲謂嶷賊上人皆惶恐並戒嚴出將欲擊之乃引騎到山下無有人但見碎火來曬人袍鎧馬毛鬣皆燒於是軍人走還明日往視山中無燃火處見髑髏百頭布散在山中蔥縮新野趙貞家園中種蔥未經摘拔忽一日盡縮入地後經歲餘貞之兄弟相次分散吳氏梓吳聶友字文悌豫章新淦人少時貧賤常好射獵夜照見一白鹿射中之明尋蹤血既盡不知所在且已飢困便臥一梓樹下仰見射箭著樹枝上視之乃是昨所射箭怪其如此於是還家賚糧率子弟持斧以伐之樹微有血遂裁截為板二枚牽著陂塘中板常沉沒然時復浮出出家輒有吉慶每欲迎賓客常乘此板忽於中流欲沒客大懼友呵之還復浮出仕宦大如願位至丹陽太守在郡經年板忽隨至石頭外司白云濤中板入石頭來友驚曰板來必有意即解職歸家下船便閉戶二板挾兩邊一日即至豫章爾後板出便反為凶禍家大轗軻今新淦北二十里餘曰封溪有聶友截梓樹板濤牂柯處有梓樹今猶存乃聶友向日所截枝葉皆向下生
