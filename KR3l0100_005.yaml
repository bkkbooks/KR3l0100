body:
  text: 卷五白水素女晉安帝時侯官人謝端少喪父母無有親屬為鄰人所養至年十七八恭謹自守不履非法始出居未有妻鄰人共愍念之規為娶婦未得端夜臥早起躬耕力作不舍晝夜後于邑下得一大螺如三升壺以為異物取以歸貯瓮中畜之數日端每早至野還見其戶中有飯飲湯火如有人為者端謂鄰人為之惠也數日如此便往謝鄰人鄰人曰吾初不為是何見謝也端又以鄰人不喻其意然數甭如此後更實問鄰人笑曰卿已自取婦密著室中炊爨而言吾為之炊耶端默然心疑不知其故後以雞鳴出去平早潛歸于籬外竊窺其家中見一少女從甕中出至竈下燃火端便入門徑至甕所視螺但見女乃到竈下問之曰新婦從何所來而相為炊女大惶惑欲還甕中不能得去答曰我天漢中白水素女也天帝哀卿少孤恭慎自守故使我權為守舍炊烹十年之中使卿居富得婦自當還去而卿無故竊相窺掩吾形已見不宜復留當相委去雖然爾後自當少差勤于田作漁采治生留此殼去以貯米穀亦不可乏端請留終不肯時天忽風雨翕然而去端為立神座時節祭祀居常饒足不致大富耳於是鄉人以女妻之後任至令長云今道中素女祠是也清溪廟神晉太康中謝家沙門竺曇遂年二十餘白皙端正流俗沙門常行經清溪廟前過因入廟中看暮歸夢一婦人來語云君當來作我廟中神不復久曇遂夢問婦人是誰婦人云我是清溪廟中姑如此一月許便病臨死謂同學年少曰我無福亦無大罪死乃當作清溪廟神諸君行便可過看之既死後諸年少道令詣其廟既至便靈語相勞問聲音如昔時臨去云久不聞唄聲思一聞之其伴慧覲便為作唄訖其神猶唱讚語云岐路之訣尚有淒愴況此之乖形神分散窈冥之嘆情何可言既而歔欷不自勝諸道人等皆為涕泣王導子悅王導子悅為中書郎導夢人以百萬錢買悅導潛為祈禱者備矣尋掘地得錢百萬意甚惡之一一皆藏閉及悅疾篤導憂念時至積日不食忽見一人形狀甚偉被甲持刀問是何人曰僕蔣侯也公兒不佳欲為請命故來爾公勿復憂導因與之食遂至數升食畢勃然謂導曰中書命盡非可救也言訖不見悅亦隕絕吳望子會稽縣東野有女子姓吳字望子路忽見一貴人儼然端坐即蔣侯像也因擲兩橘與之數數形見遂隆情好望子心有所欲輒空中得之常思膾一雙鯉自空而至木像彎弓孫恩作逆時吳興分亂一男子忽急突入蔣侯廟始入門木像彎弓射之即卒行人及守廟者無不皆見白頭公晉太元中樂安高衡為魏郡太守戍石頭其孫雅之在廄中云有神來降自稱白頭公拄杖光輝照屋與雅之輕舉宵行暮至京口來還後雅之父子為桓玄所殺臨賀太守永和中義興人姓周出都乘馬從兩人行未至村日暮道邊有一新草小屋一女子出門年可十六七姿容端正衣服鮮潔望見周過謂曰日已向暮前村尚遠臨賀詎得至周便求寄宿此女為燃火作食向一更中聞外有小兒喚阿香聲女應諾尋云官喚汝推雷車女乃辭行云今有事當去夜遂大雷雨向曉女還周既上馬看昨所宿處止見一新冢冢口有馬尿及餘草周甚驚惋後五年果作臨賀太守何參軍女豫章人劉廣年少未婚至田舍見一女子云我是何參軍女年十四而夭為西王母所養使與下土人交廣與之纏綿其日于席下得手巾裹雞舌香其母取巾燒之乃是火浣布靈見桓大司馬從南州還拜簡文皇帝陵左右覺其有異說登車謂從者曰先帝向遂靈見既不述帝所言故眾莫之知但見將拜時頻言臣不敢而已又問左右殷涓形貌有人答涓為人肥短黑色甚醜桓云向亦見在帝側形亦如此意惡之遂遇疾未幾而薨
