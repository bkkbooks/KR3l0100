body:
  text: 卷七虹化丈夫廬陵巴邱人陳濟者作州吏其婦秦獨在家常有一丈夫長丈餘儀容端正著絳碧袍采色炫耀來從之後常相期于一山澗間至于寢處不覺有人道相感接如是數年比鄰入觀其所至輒有虹見秦至水側丈夫以金瓶引水共飲後遂有身生而如人多肉濟假還秦懼見之乃納兒著甕中此丈夫以金瓶與之令覆兒云兒小未可得將去不須作衣我自衣之即與絳囊以裹之令可時出與乳於時風雨暝晦鄰人見虹下其庭化為丈夫復少時將兒去亦風雨暝晦人見二虹出其家數年而來省母後秦適田見二虹于澗畏之須臾見丈夫云是我無所畏也從此乃絕山𤢖宋元嘉初富陽人姓王于窮瀆中作蟹斷旦往觀之見一材長二尺許在斷中而斷裂開蟹出都盡乃修治斷出材岸上明往視之材復在斷中斷敗如前王又治斷出材明晨視所見如初王疑此材妖異乃取內蟹籠中攣頭擔歸云至家當斧砍燃之未至家二三里聞籠中倅倅動轉頭顧視見向材頭變成一物人面猴身一身一足語王曰我性嗜蟹比日實入水破君蟹斷入斷食蟹相負已爾望君見恕開籠出我我是山神當相佑助并令斷得大蟹王曰如此暴人前後非一罪自應死此物種類專請包放王廻顧不應物曰君何姓名我欲知之頻問不已王遂不答去家轉近物曰既不放我又不告我姓字當復何計但應就死耳王至家熾火焚之後寂然無復聲土俗謂之山𤢖云知人姓名則能中傷人所以勤勤問王欲害人自免平陽隕肉劉聰偽建元元年正月平陽地震其崇明觀陷為池水赤如血赤氣至天有赤龍奮迅而去流星起于牽牛入紫微龍形委蛇其光照地落於平陽北十里視之則肉臭聞于平陽長三十步廣二十七步肉旁嘗有哭聲晝夜不止數日聰後劉氏產一蛇一獸各害人而走尋之不得頃之見於隕肉之旁俄而劉氏死哭聲自絕周子文失魂晉中興後譙郡周子文家在晉陵少時喜射獵常入山忽山岫間有一人長五六丈手捉弓箭箭鏑頭廣二尺許白如霜雪忽出聲喚曰阿鼠子文不覺應曰喏此人便牽弓滿鏑向子文子文便失魂厭伏毛人晉孝武世宣城人秦精常入武昌山中采茗忽遇一人身長丈餘遍體皆毛從山北來精見之大怖自謂必死毛人徑牽其臂將至山曲入大叢茗處放之便去精因采茗須臾復來乃探懷中二十枚橘與精甘美異常精甚怪負茗而歸朱衣人會稽盛逸常晨興路未有行人見門外柳樹上有一人長二尺衣朱衣朱冠冕俯以舌舐葉上露良久忽見逸神意驚遽即隱不見兩頭人宋永初三年謝南康家婢行逢一黑狗語婢云汝看我背後婢舉頭見一人長三尺有兩頭婢驚怕返走人狗亦隨婢後至家庭中舉家避走婢問狗汝來何為狗云欲吃食爾於是婢為設食並食食訖兩頭人出婢因謂狗曰人已去矣狗曰正巳復來良久乃沒不知所在後家人死喪殆盡壁中一物宋襄城李頤其父為人不信妖邪有一宅由來凶不可居居者輒死父便買居之多年安吉子孫昌熾為二千石當徙家之官臨去請會內外親戚酒食既行父乃言曰天下竟有吉凶否此宅由來言凶自吾居之多年安吉乃得遷官鬼為何在自今已後便為吉宅居者住止心無所嫌也語訖如廁須臾見壁中有一物如卷席大高五尺許正白便還取刀中之中斷化為兩人復橫斫之又成四人便奪取反斫殺李持至坐上斫殺其子弟凡姓李者必死惟異姓無他頤尚幼在抱家內知變乳母抱出後門藏他家止其一身獲免頤字景真位至湘東太守狗變形宋王仲文為河南郡主簿居緱氏縣北得休因晚行澤中見車後有白狗仲文甚愛之欲取之忽變形如人狀似方相目赤如火磋牙吐舌甚可憎惡仲文大怖與奴共擊之不勝而走告家人合十餘人持刀捉火自來視之不知所在月餘仲文忽復見之與奴並走未到家伏地俱死
