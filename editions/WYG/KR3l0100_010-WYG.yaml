body:
  text: 搜神後記卷十晉陶潛撰長沙有人㤀其姓名家住江邊有女子渚次澣衣覺身中有異後不以為患遂姙身生三物皆如鮧音提魚女以已所生甚憐異之乃著澡盤水中養之經三月此物遂大乃是蛟子各有字大者為當洪次者為破阻小者為撲岸天暴雨水三蛟一時俱去遂失所在後天欲雨此物輒來女亦知其當來便出望之蛟子亦舉頭望母良乆方去經年後女亾三蛟子一時俱至墓所哭之經日乃去聞其哭聲狀如狗嘷安城平都縣尹氏居在郡東十里日黄村尹佃舎在焉元嘉二十三年六月中尹兒年十三守舎見一人年可二十許騎白馬張繖及從者四人衣並黄色從東方而來至門呼尹兒來暫寄息因入舎中庭下坐牀一人捉繖覆之尹兒看其衣悉無縫馬五色斑似鱗甲而無毛有頃雨氣至此人上馬去廻顧尹兒曰明日當更來尹兒觀其去西行躡虚而漸升須臾雲氣四合白晝為之晦暝明日大水暴出山谷沸涌丘壑淼漫將淹尹舎忽見大蛟長三丈餘盤屈庇其舎焉武昌虬山有龍穴居人每見虬飛翔出入嵗旱禱之即雨後人築塘其下曰虬塘吳興人章茍者五月中於田中耕以飯置菰裏每晚取食飯亦已盡如此非一後伺之見一大蛇偷食茍遂以鈠斫之蛇便走去茍逐之至一坂有穴便入穴但聞啼聲云斫傷我某甲或言何如或云付雷公令霹􅋬殺奴須臾雲雨暝合霹􅋬覆茍上茍乃跳梁大罵曰天使我貧窮展力耕墾蛇來偷食罪當在蛇反更霹􅋬我耶乃無知雷公也雷公若來吾當以鈠斫汝腹須臾雲雨漸散轉霹􅋬向蛇穴中蛇死者數十吳末臨海人入山射獵為舎住夜中有一人長一丈著黄衣白帶徑來謂射人曰我有讐尅明日當戰君可見助當厚相報射人曰自可助君耳何用謝為答曰明日食時君可出溪邊敵從北來我南往應白帶者我黄帶者彼射人許之明出果聞岸北有聲狀如風雨草木四靡視南亦爾唯見二大蛇長十餘丈於溪中相遇便相盤繞白蛇勢弱射人因引弩射之黄蛇即死日將暮復見昨人來辭謝云住此一年獵明年以去慎忽復來來必為禍射人曰善遂停一年獵所獲甚多驟至巨富數年後忽憶先所獲多乃㤀前言復更往獵見先白帶人告曰我語君勿復更來不能見用讐子已大今必報君非我所知射人聞之甚怖便欲走乃見三烏衣人皆長八尺俱張口向之射人即死元嘉中廣州有三人共入山中伐木忽見石窠中有二卵大如升取煮之湯始熱便聞林中如風雨聲須臾有一蛇大十圍長四五丈徑來於湯中銜卵去三人無幾皆死晉太元中有士人嫁女於近村者至時夫家遣人來迎女家好遣發又令女乳母送之既至重門累閣擬於王侯廊柱下有燈火一婢子嚴粧直守後房帷帳甚羙至夜女抱乳母涕泣而口不得言乳母宻于帳中以手潜摸之得一蛇如數圍柱纒其女從足至頭乳母驚出外柱下守燈婢子悉是小蛇燈火乃是蛇眼晉咸康中豫州刺史毛寶戍邾城有一軍人於武昌市見人賣一白龜子長四五寸潔白可愛便買取持歸著甕中養之七日漸大近欲尺許其人憐之持至江邊放江水中視其去後邾城遭石季龍攻陷毛寶棄豫州赴江者莫不沉溺於時所養龜人被鎧持刀亦同自投既入水中覺如墮一石上水裁至腰須臾游出中流視之乃是先所放白龜甲六七尺既抵東岸出頭視此人徐㳺而去中江猶回首視此人而没搜神後記卷十
