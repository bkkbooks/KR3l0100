body:
  text: 捜神後記卷八晉陶潜撰王機為廣州刺史入厠忽見二人著烏衣與機相捍良久擒之得二物如鳥鴨以問鮑靚靚曰此物不祥機焚之徑飛上天尋誅死晉義熙中烏傷革輝夫在婦家宿三更後有兩人把火至堦前疑是凶人往打之欲下杖悉變成蝴蝶繽紛飛散有衝輝夫腋下便倒地少時死諸葛長民富貴後常一月中輒十數夜眠中驚起跳踉如與人相打毛修之嘗與同宿見之驚愕問其故答曰正見一物甚黒而有毛脚不分明竒健非我無以制之也後來轉數屋中柱及椽桷間悉見有蛇頭令人以刃懸斫應刅𨼆藏去輙復出又擣衣杵相與語如人聲不可解於壁見有巨手長七八尺臂大數圍令斫之忽然不見未幾伏誅新野庾謹母病兄弟三人悉在侍疾白日常燃火忽見帳帶自卷自舒如此數四須臾間牀前聞狗聲異常舉家共視了不見狗見一死人頭在地頭猶有髪兩眼尚動甚可憎惡其家怖懼乃不持出門即於後園中瘞之明日往視乃出土上兩眼猶爾即又埋之後日復出乃以塼頭合埋之遂不復出他日其母便亾王綏字彦猷其家夜中梁上無故有人頭墮於牀而流血滂沱俄拜荆州刺史坐父愉之謀與弟納並被誅晉永嘉五年張一作髙榮為髙平戍邏主時曹嶷賊宼離亂人民皆塢壘自保固見山中火起飛埃絶焰十餘丈𣗳顛火炎響動山谷又聞人馬鎧甲聲謂嶷賊上人皆惶􅂲並戒嚴出將欲擊之乃引騎到山下無有人但見碎火來曬人袍鎧馬毛鬛皆燒於是軍人走還明日往視山中無燃火處見髑髏百頭布散山中新野趙貞家園中種葱未經摘㧞忽一日盡縮入地後經嵗餘貞之兄弟相次分散吳聶友字文悌豫章新滏古音切人少時貧賤常好射獵夜照見一白鹿射中之明尋蹤血既盡不知所在且已饑困便卧一梓𣗳下仰見射箭著𣗳枝上視之乃是昨所射箭恠其如此於是還家賫粮率子弟持斧以伐之𣗳微有血遂裁截為板二枚牽著陂塘中板常沉没然時復浮出出家輒有吉慶每欲迎賔客常乗此板忽於中流欲没客大懼友呵之還復浮出仕宦大如願位至丹陽太守在郡經年板忽隨至石頭外司白云濤中板入石頭來友驚曰板來必有意即解職歸家下船便閉户二板挾兩邊一日即至豫章爾後板出便反為凶禍家大轗軻今新滏北二十里餘曰封溪有聶友截梓𣗳板濤牂柯處有梓𣗳今猶存乃聶友向日所截枝葉皆向下生搜神後記卷八
