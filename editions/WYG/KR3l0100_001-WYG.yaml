body:
  text: 搜神後記卷一晉陶潛撰丁令威本遼東人學道于靈虚山後化鶴歸遼集城門華表柱時有少年舉弓欲射之鶴乃飛徘徊空中而言曰有鳥有鳥丁令威去家千年今始歸城郭如故人民非何不學仙冢纍纍遂髙上冲天今遼東諸丁云其先世有升仙者但不知名字耳嵩髙山北有大穴莫測其深百姓嵗時遊觀晉初嘗有一人誤墮穴中同輩冀其儻不死投食於穴中墜者得之為尋穴而行計可十餘日忽然見明又有草屋中有二人對坐圍碁局下有一杯白飲墜者告以饑渇碁者曰可飲此遂飲之氣力十倍棊者曰汝欲停此否墜者不願停碁者曰從此西行有天井其中多蛟龍但投身入井自當出若餓取井中物食墜者如言半年許乃出蜀中歸洛下問張華華曰此仙館大夫所飲者玉漿也所食者龍穴石髓也㑹稽剡縣民𡊮相根碩二人獵經深山重嶺甚多見一羣山羊六七頭逐之經一石橋甚狹而峻羊去根等亦隨渡向絶崖崖正赤壁立名曰赤城上有水流下廣狹如匹布剡人謂之瀑布羊徑有山穴如門豁然而過既入内甚平敞草木皆香有一小屋二女子住其中年皆十五六容色甚羙著青衣一名瑩珠一名潔玉見二人至忻然云早望汝來遂為室家忽二女出行云復有得壻者往慶之曵履於絶巖上行琅琅然二人思歸潜去歸路二女追還已知乃謂曰自可去乃以一腕囊與根等語曰慎勿開也於是乃歸後出行家人開視其囊囊如蓮花一重去一重復至五盖中有小青鳥飛去根還知此悵然而已後根於田中耕家依常餉之見在田中不動就視但有殻如蟬蜕也滎陽人姓何㤀其名有名聞士也荆州辟為别駕不就𨼆遁養志常至田舎人収穫在場上忽有一人長丈餘蕭疎單衣角巾來詣之翩翩舉其兩手並舞而來語何云君曽見韶舞不此是韶舞且舞且去何尋逐徑向一山山有穴纔容一人其人命入穴何亦隨之入初甚急前輒閒曠便失人見有良田數十頃何隨墾作以為世業子孫至今頼之晉太元中武林人捕魚為業縁溪行㤀路之逺近忽逢桃花林夾岸數百步中無雜𣗳芳華鮮羙落英繽紛漁人甚異之漁人姓黄名道真復前行欲窮其林林盡水源便得一山山有小口彷彿若有光便捨舟從口入初極狹纔通人復行數十步豁然開朗土地曠空屋舎儼然有良田羙池桑竹之屬阡陌交通雞犬相聞男女衣著悉如外人黄髪垂髫並怡然自樂見漁人大驚問所從來具答之便要還家為設酒殺雞作食村中人聞有此人咸來問訊自云先世避秦難率妻子邑人至此絶境不復出焉遂與外隔問今是何世乃不知有漢無論魏晉此人一一具言所聞皆為歎惋餘人各復延至其家皆出酒食停數日辭去此中人語云不足為外人道也既出得其船便扶向路處處誌之及郡乃詣太守説如此太守劉歆即遣人隨之往尋向所誌不復得也南陽劉驎之字子驥好遊山水嘗採藥至衡山深入㤀反見有一澗水水南有二石囷一閉一開水深廣不得渡欲還失道遇伐薪人問徑僅得還家或説囷中皆仙方靈藥及諸雜物驎之欲更尋索不復知處矣長沙醴陵縣有小水有二人乗船取樵見岸下土穴中水逐流出有新砍木片逐流下深山中有人跡異之乃相謂曰可試如水中看何由爾一人便以笠自障入穴穴纔容人行數十步便開明朗然不異世間平樂縣有山臨水巖間有兩目如人眼極大瞳子白黒分明名為目巖始興機山東有兩巖相向如鴟尾石室數十所經過皆聞有金石絲竹之響中宿縣有貞女峽峽西岸水際有石如人影狀似女子是曰貞女父老相傳秦世有女數人取螺於此遇風雨晝昏而一女化為此石臨城縣南四十里有葢山百許步有姑舒泉昔有舒女與父析薪於此泉女因坐牽挽不動乃還告家比還惟見清泉湛然女母曰吾女好音樂乃作絃歌泉涌洄流有朱鯉一雙今人作樂嬉戲泉故涌出搜神後記卷一
