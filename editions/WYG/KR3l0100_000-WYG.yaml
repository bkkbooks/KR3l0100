body:
  text: 捜神後記小説家𩔖二異聞之屬提要臣等謹案捜神後記十卷舊本題晉陶潜撰中記桃花源事一條全錄本集所載詩序惟增注漁人姓黄名道真七字又載干寳父婢事亦全錄晉書剽掇之迹顯然可見明沈士龍䟦謂潜卒于元嘉四年而此有十四十六年事陶集多不稱年號以干支代之而此書題永初元年其為偽托固不待辨然其書文詞古雅非唐以後人所能隋書經籍志著錄已稱陶潜則贋撰嫁名其來已乆又陸羽茶經引其中晉武帝時宣城人秦精入武昌山採茗一條與此本所載相合封演見聞記引其中有人因病能飲茗一斛二斗後吐一物一條與此本桓宣武督將一條僅文有詳畧及牛肺字作牛肚茗瘕字作斛二瘕其事亦與此本所載相合知今所傳刻猶古本矣其中丁令威化鶴阿香雷車諸事唐宋詞人並逓相援引承用至今題陶潜撰者固妄要不失為六代遺書也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b485b9ef1d330cbddcddc746a5f55829275dabaf909dcdd649dd53eb6cdc5acd
