body:
  text: 搜神後記卷三晉陶潛撰程咸一作程武字咸休其母始懐咸夢老公投藥與之服此當生桂子晉武帝時厯位至侍中有名於世𡊮真在豫州遣女妓紀陵送阿薛阿郭阿馬三妓與桓宣武既至經時三人半夜共出庭前月下觀望有銅瓮水在其側忽見一流星夜從天直墮瓮中驚喜共視忽如二寸火珠流於水底炯然明浄乃相謂曰此吉祥也當誰應之於是薛郭二人更以瓢杓接取並不得阿馬最後取星正入瓢中便飲之既而若有感焉俄而懐桓𤣥𤣥雖簒位不終而數年之中榮貴極矣臨淮公荀序字休𤣥母華夫人憐爱過常年十嵗從南臨歸經青草湖時正帆風駛序出塞郭忽落水比得下帆已行數十里洪波淼漫母撫膺逺望少頃見一掘頭船漁父以楫棹船如飛載序還之云送府君還荀後位至常伯長沙相故云府君也廬陵巴丘人文晁一作周冕者世以田作為業年常田數十頃家漸富晉太元初秋収已過刈穫都畢明旦至田禾悉復滿湛然如初即便更穫所獲盈倉於此遂為巨富上虞魏全家在縣北忽有一人著孝子服皂笠手巾撩口來詣全家語曰君有錢一千萬銅器亦如之大栁𣗳錢在其下取錢當得爾於君家大不吉僕尋為君取此便去自爾出三十年遂不復來全家亦不取錢元嘉元年建安郡山賊百餘人破郡治抄掠百姓資産子女遂入佛圖搜掠財寶先是諸供養具别封置一室賊破户忽有􅁡蜂數萬頭從衣簏出同時噬螫羣賊身百腫痛眼皆盲合先諸所掠皆棄而走蔡裔有勇氣聲若雷震嘗有二偷兒入室裔拊牀一呼二盗俱隕昔有一人與奴同時得腹􅛎病治不能愈奴既死乃剖腹視之得一白鼈赤眼甚鮮明乃試以諸毒藥澆灌之并内藥於鼈口悉無損動乃係鼈於牀脚忽有一客來看之乗一白馬既而馬溺濺龞鼈乃惶駭欲疾走避溺因繋之不得去乃縮藏頭頸足焉病者察之謂其子曰吾病或可以救矣乃試取白馬溺以灌鼈上須臾便消成數升水病者乃頓服升餘白馬溺病豁然愈太尉郗鍳字道徽鎮丹徒曽出獵時二月中蕨始生有一甲士折食一莖即覺心中淡淡或作潭潭欲吐因歸乃成心腹疼痛經半年許忽大吐吐出一赤蛇長尺餘尚活動揺乃掛著屋簷前汁稍稍出蛇漸焦小經一宿視之乃是一莖蕨猶昔之所食病遂除差桓宣武時有一督將因時行病後虚熱更能飲複茗必一斛二斗乃飽纔减升合便以為不足非復一日家貧後有客造之正遇其飲複茗亦先聞世有此病仍令更進五升乃大吐有一物出如升大有口形質縮縐狀如牛肚客乃令置之於盆中以一斛二斗複茗澆之此物噏之都盡而止覺小脹又加五升便悉混然從口中涌出既吐此物其病遂差或問之此何病答云此病名斛二二者作茗􅛎桓哲字明期居豫章時梅𤣥龍為太守先已病矣哲往省之語梅云吾昨夜忽夢見作卒迎卿來作泰山府君梅聞之愕然曰吾亦夢見卿為卒着喪衣來迎我經數日復同夢如前云二十八日當拜至二十七日晡時桓忽中惡腹滿就梅索麝香丸梅聞便令作凶具二十七日桓便亾二十八日而梅卒平原華歆字子魚為諸生時常宿人門外主人婦夜産有頃兩吏來詣其門便相向辟易欲退却相謂曰公在此因踟躊良乆一吏曰籍當定奈何得住乃前向子魚拜相將入出並行共語曰當與幾嵗一人云當與三嵗天明子魚去後欲騐其事至三嵗故往視兒消息果三嵗已死乃自喜曰我固當公後果為太尉宋時有一人㤀其姓氏與婦同寢天曉婦起出後其夫尋亦出外婦還見其夫猶在被中眠須臾奴子自外來云郎求鏡婦以奴詐乃指牀上以示奴奴云適從郎間來於是白馳其夫夫大愕便入與婦共視被中人髙枕安寢正是其形了無一異慮是其神魂不敢驚動乃共以手徐徐撫牀遂冉冉入席而滅夫婦心怖不已少時夫忽得疾性理􅆾錯終身不愈董夀之被誅其家尚未知妻夜坐忽見夀之居其側嘆息不已妻問夜間何得而歸夀之都不應答有頃出門繞雞籠而行籠中雞驚叫妻疑有異持火出户視之見血數升而夀之失所在遂以告姑因與大小號哭知有變及晨果得凶問宋時有諸生逺學其父母燃火夜作兒忽至前嘆息曰今我但魂爾非復生人父母問之兒曰此月初病以今日某時亾今在瑯邪任子成家明日當殮來迎父母父母曰去此千里雖復顛倒那得及汝兒曰外有車乗但乗之自得至矣父母從之上車若睡比雞鳴已至所在視其駕乗但柴車木馬遂與主人相見臨兒悲哀問其疾消息如言搜神後記卷三
