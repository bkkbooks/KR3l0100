body:
  text: 卷一丁令威丁令威本遼東人學道于靈虛山後化鶴歸遼集城門華表柱時有少年舉弓欲射之鶴乃飛徘徊空中而言曰有鳥有鳥丁令威去家千年今始歸城郭如故人民非何不學仙冢壘壘遂高上沖天今遼東諸丁云其先世有升仙者但不知名字耳仙館玉漿嵩高山北有大穴莫測其深百姓歲時游觀晉初嘗有一人誤墮穴中同輩冀其儻不死投食于穴中墜者得之為尋穴而行計可十余日忽然見明又有草屋中有二人對坐圍棊局下有一杯白飲墜者告以飢渴棊者曰可飲此遂飲之氣力十倍棊者曰汝欲停此否墜者不願停棊者曰從此西行有天井其中多蛟龍但投身入井自當出若餓取井中物食墜者如言半年許乃出蜀中歸洛下問張華華曰此仙館大夫所飲者玉漿也所食者龍穴石髓也剡縣赤城會稽剡縣民袁相根碩二人獵經深山重嶺甚多見一群山羊六七頭逐之經一石橋甚狹而峻羊去根等亦隨渡向絕崖崖正赤壁立名曰赤城上有水流下廣狹如匹布剡人謂之瀑布羊徑有山穴如門豁然而過既入內甚平敞草木皆香有一小屋二女子住其中年皆十五六容色甚美著青衣一名瑩珠一名潔玉見二人至忻然云早望汝來遂為室家忽二女出行云復有得婿者往慶之曳履于絕岩上行琅琅然二人思歸潛去歸路二女追還已知乃謂曰自可去乃以一腕囊與根等語曰慎勿開也于是乃歸後出行家人開視其囊囊如蓮花一重去一重復至五蓋中有小青鳥飛去根還知此悵然而已後根于田中耕家依常餉之見在田中不動就視但有殼如蟬蛻也韶舞滎陽人姓何忘其名有名聞士也荊州辟為別駕不就隱遁養志常至田舍人收獲在場上忽有一人長丈余蕭疏單衣角巾來詣之翩翩舉其兩手並舞而來語何云君曾見韶舞不此是韶舞且舞且去何尋逐徑向一山山有穴纔容一人其人即入穴何亦隨之入初甚急前輒閑曠便失人見有良田數十頃何遂墾作以為世業子孫至今賴之桃花源晉太元中武陵人捕魚為業緣溪行忘路之遠近忽逢桃花林夾岸數百步中無雜樹芳華鮮美落英繽紛漁人甚異之復前行欲窮其林林盡水源便得一山山有小口彷佛若有光便舍舟從口入初極狹才通人復行數十步豁然開朗土地曠空屋舍儼然有良田美池桑竹之屬阡陌交通雞犬相聞男女衣著悉如外人黃發垂髫并怡然自樂見漁人大驚問所從來具答之便要還家為設酒殺雞作食村中人聞有此人咸來問訊自云先世避秦難率妻子邑人至此絕境不復出焉遂與外隔問今是何世乃不知有漢無論魏晉此人一一具言所聞皆為嘆惋餘人各復延至其家皆出酒食停數日辭去此中人語云不足為外人道也既出得其船便扶向路處處誌之及郡乃詣太守說如此太守劉歆即遣人隨之往尋向所志不復得也劉驎之南陽劉驎之字子驥好游山水嘗采藥至衡山深入忘反見有一澗水水南有二石囷一閉一開水深廣不得渡欲還失道遇伐弓人問徑僅得還家或說囷中皆仙方靈藥及諸雜物驎之欲更尋索不復知處矣穴中人世長沙醴陵縣有小水有二人乘船取樵見岸下土穴中水逐流出有新斫木片逐流下深山中有人跡異之乃相謂曰可試如水中看何由爾一人便以笠自障入穴穴纔容人行數十步便開明朗然不異世間目巖平樂縣有山臨水岩間有兩目如人眼極大瞳子白黑分明名為目岩石室樂聲始興機山東有兩巖相向如鴟尾石室數十所經過皆聞有金石絲竹之響貞女峽中宿縣有貞女峽峽西岸水際有石如人影狀似女子是曰貞女父老相傳秦世有女數人取螺于此遇風雨晝昏而一女化為此石姑舒泉臨城縣南四十里有蓋山百許步有姑舒泉昔有舒女與父析薪于此泉女因坐牽挽不動乃還告家比還唯見清泉湛然女母曰吾女好音樂乃作弦歌泉涌洄流有朱鯉一雙今人作樂嬉戲泉故涌出
