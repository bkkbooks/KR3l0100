body:
  text: 卷二吳舍人吳舍人名猛字世雲有道術同縣鄒惠政迎猛夜于家中庭燒香忽有虎來抱政兒超籬去猛語云無所苦須臾當還虎去數十步忽然復送兒歸政遂精進乞為好道士猛性至孝小兒時在父母傍臥時夏日多蚊虫而終不搖扇同宿人覺問其故答云懼蚊虫去噆我父母爾及父母終行伏墓次蜀賊縱暴焚燒邑屋發掘墳壠民人迸竄猛在墓側號慟不去賊為之感愴遂不犯謝允謝允從武當山還在桓宣武座有言及左元放為曹公致鱸魚者允便云此可得爾求大瓮盛水朱書符投水中俄有一鯉魚鼓鰭水中杜子恭錢塘杜子恭有祕術嘗就人借瓜刀其主求之子恭曰當即相還耳既而刀主行至嘉興有魚躍入船中破魚腹得瓜刀鼠市太興中衡陽區純作鼠市四方丈餘開四門門有一木人縱四五鼠于中欲出門木人輒以手推之比邱尼晉大司馬桓溫字元子末年忽有一比丘尼失其名來自遠方投溫為檀越尼才行不恆慍甚敬待居之門內尼每浴必至移時溫疑而窺之見尼裸身揮刀破腹出臟斷截身首支分臠切溫怪駭而還及至尼出浴室身形如常溫以實問尼答曰若逐凌君上形當如之時溫方謀問鼎聞之悵然故以戒懼終守臣節尼後辭去不知所在三薔茨沛國有一士人姓周同生三子年將弱冠皆有聲無言忽有一客從門過因乞飲聞其兒聲問之曰此是何聲答曰是僕之子皆不能言客曰君可還內省過何以至此主人異其言知非常人良久出云都不憶有罪過客曰試更思幼時事入內食頃出語客曰記小兒時當床上有燕巢中有三子其母從外得食哺三子皆出口受之積日如此試以指內巢中燕雛亦出口承受因取三薔茨各與食之既而皆死母還不見子悲鳴而去昔有此事今實悔之客聞言遂變為道人之容曰君既自知悔罪今除矣言訖便聞其子言語周正忽不見此道人佛圖澄天竺人佛圖澄永嘉四年來洛陽善誦神咒役使鬼神腹傍有孔常以絮塞之每夜讀書則拔絮孔中出光照于一室平旦至流水側從孔中引出五臟六腑洗之訖還內腹中胡道人咒術石虎鄴中有一胡道人知呪術乘驢作估客于外國深山中行下有絕澗窅然無底忽有惡鬼偷牽此道人驢下入絕澗道人尋跡呪誓呼諸鬼王須臾即驢物如故曇游曇游道人清苦沙門也剡縣有一家事蠱人噉其食飲無不吐血死游嘗詣之主人下食游依常呪願雙蜈蚣長尺餘便于盤中跳走游便飽食而歸安然無他幸靈高悝家有鬼怪言詞呵叱投擲內外不見人形或器物自行再三發火巫祝厭劾而不能絕適值幸靈乃要之至門見符索甚多並取焚之惟據軒小坐而去其夕鬼怪即絕郭璞活馬趙固常乘一匹赤馬以戰征甚所愛重常繫所住齋前忽腹脹少時死郭璞從北過因往詣之門吏云將軍好馬甚愛惜今死甚懊惋璞便語門吏云可入通道吾能活此馬則必見我門吏聞之驚喜即啟固固踴躍令門吏走往迎之始交寒溫便問卿能活我馬乎璞曰我可活爾固忻喜即問須何方術璞云得卿同心健兒二三十人皆令持竹竿于此東行三十里當有邱陵林樹狀若社廟有此者便當以竹竿攪擾打拍之當得一物便急持歸既得此物馬便活矣于是左右驍勇之士五十人使去果如璞言得大叢林有一物似猴而非走出人共逐得便抱持歸此物遙見死馬便跳梁欲往璞令放之此物便自走往馬頭間噓吸其鼻良久馬起噴奮奔迅便不見此物固厚貲給璞得過江左鏡罌王文獻曾令郭璞筮巳一年吉凶璞曰當有小不吉利可取廣州二大罌盛水置床張二角名曰鏡好以厭之至某時撤罌去水如此其災可消至日忘之尋失銅鏡不知所在後撤去水乃見所失鏡在于罌中罌口數寸鏡大尺餘王公復令璞筮鏡罌之意璞云撤罌違期故致此妖邪魅所為無他故也使燒車轄而鏡立出郭璞預屬中興初郭璞每自為卦知其凶終嘗行經建康柵塘逢一趨步少年甚寒便牽住脫絲布袍與之其人辭不受璞曰但取後自當知其人受而去及當死果此人行刑傍人皆為求屬璞曰我托之久矣此人為之歔欷哽咽行刑既畢此人乃說杜不愆高平郗超字嘉賓年二十余得重病廬江杜不愆少就外祖郭璞學易卜頗有經驗超令試占之卦成不愆曰案卦言之卿所恙尋愈然宜于東北三十里上官姓家索其所養雄雉籠而絆之置東檐下卻後九日景午日午時必當有野雌雉飛來與交合既畢雙飛去若如此不出二十日病都除又是休應年將八十位極人臣若但雌逝雄留者病一周方差年半八十名位亦失超時正羸篤慮命在旦夕笑而答曰若保八十之半便有餘矣一周病差何足為淹然未之信或勸依其言索雄果得至景午日超臥南軒之下觀之至日晏果有雌雉飛入籠與雄雉交而去雄雉不動超嘆息曰管郭之奇何以尚此超病逾年乃起至四十卒于中書郎
