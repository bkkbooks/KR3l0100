body:
  text: 卷九素衣女子錢塘人姓杜船行時大雪日暮有女子素衣來岸上杜曰何不入船遂相調戲杜合船載之後成白鷺飛去杜惡之便病死虎卜吉丹陽人沈宗在縣治下以卜為業義熙中左將軍檀侯鎮姑孰好獵以格虎為事忽有一人著皮衣袴乘馬從一人亦著皮袴以紙裹十餘錢來詣宗卜云西去覓好食東去覓食好宗為作卦卦成告之東向吉西向不利因就宗乞飲內口著甌中狀如牛飲既出東行百餘步從者及馬皆化為虎自此以後虎暴非常熊穴晉升平中有人入山射鹿忽墮一坎窅然深絕內有數頭熊子須臾有一大熊來瞪視此人人謂必以害己良久出藏果分與諸子末後作一分置此人前此人飢甚於是冒死取啖之既而轉相狎習熊母每旦出覓果食還輒分此人賴以延命熊子後大其母一一負之而出子既盡人分死坎中窮無出路熊母尋復還入坐人邊人解其意便抱熊足于是躍出竟得無他鹿女脯淮南陳氏于田中種豆忽見二女子姿色甚美著紫纈襦青裙天雨而衣不濕其壁先挂一銅鏡鏡中見二鹿遂以刀斫獲之以為脯猴私宮妓晉太元中丁零王翟昭後宮養一獼猴在妓女房前前後妓女同時懷妊各產子三頭出便跳躍昭方知是猴所為乃殺猴及子妓女同時號哭昭問之云初見一年少著黃練單衣白紗帢甚可愛笑語如人烏龍會稽句章民張然滯役在都經年不得歸家有少婦無子惟與一奴守舍婦遂與奴私通然在都養一狗甚快名曰烏龍常以自隨後假歸婦與奴謀欲得殺然然及婦作飯食共坐下食婦語然與君當大別離君可強笑然未得噉奴已張弓矢當戶須然食畢然涕泣不食乃以盤中肉及飯擲狗祝曰養汝數年吾當將死汝能救我否狗得食不啖惟注睛舐唇視奴然亦覺之奴催食轉急然決計拍膝大呼曰烏龍與手狗應聲傷奴奴失刀仗倒地狗咋其陰然因取刀殺奴以婦付縣殺之楊生狗晉太和中廣陵人楊生養一狗甚愛憐之行止與俱後生飲酒醉行大澤草中眠不能動時方冬月燎原風勢極盛狗乃周章號喚生醉不覺前有一坑水狗便走往水中還以身灑生左右草上如此數次周旋跬步草皆沾濕火至免焚生醒方見之爾後生因暗行墮于空井中狗呻吟徹曉有人經過怪此狗向井號往視見生生曰君可出我當有厚報人曰以此狗見與便當相出生曰此狗曾活我已死不得相與餘即無惜人曰若爾便不相出狗因下頭目井生知其意乃語路人云以狗相與人即出之繫之而去卻後五日狗夜走歸蔡詠家狗晉穆哀之世領軍司馬濟陽蔡詠家狗夜輒群眾相吠往視便伏後日使人夜伺有一狗著黃衣白帢長五六尺眾狗共吠之尋跡定是詠家老黃狗即打殺之吠乃止張平家狗代郡張平者苻堅時為賊帥自號并州刺史養一狗名曰飛鷰形若小驢忽夜上廳事屋上行行聲如平常未經年果為鮮卑所逐敗走降苻堅未幾便死老黃狗太叔王氏後娶庾氏女年少色美王年六十常宿外婦深無伒後忽一夕見王還嬿婉兼常晝坐因共食奴從外來見之大驚以白王王遽入偽者亦出二人交會中庭俱著白帢衣服形貌如一真者便先舉杖打偽者偽者亦報打之二人各勑子弟令與手王兒乃突前痛打是一黃狗遂打殺之王時為會稽府佐門士云恆見一老黃狗自東而來其婦大恥病死林慮山亭犬林慮山下有一亭人每過此宿者輒病死云嘗有十餘人男女雜合衣或白或黃輒蒲博相戲時有郅伯夷宿于此亭明燭而坐誦經至中夜忽有十餘人來與伯夷並坐蒲博伯夷密以燭照之乃是群犬因執燭起陽誤以燭燒其衣作燃毛氣伯夷懷刀捉一人刺之初作人喚遂死成犬餘悉走去羊炙顧霈者吳之豪士也曾送客于升平亭時有一沙門在座是流俗道人主人欲殺一羊羊絕繩便走來投入此道人膝中穿頭向袈裟下道人不能救即將去殺之既行炙主人便先割以噉道人道人食炙下喉覺炙行走皮中毒痛不可忍呼醫來針之以數針貫其炙炙猶動搖乃破出視之故是一臠肉耳道人於此得疾遂作羊鳴吐沫還寺少時卒古冢老狐吳郡顧旃獵至一崗忽聞人語聲云咄咄今年衰乃與眾尋覓崗頂有一穽是古時冢見一老狐蹲冢中前有一卷簿書老狐對書屈指有所計校乃放太咋殺之取視簿書悉是姦人女名已經奸者乃以朱鉤頭所疏名有百數旃女正在簿次狐帶香囊襄陽習鑿齒字彥威為荊州主簿從桓宣武出獵時大雪於江陵城西見草上雪氣出伺觀見一黃物射之應箭死往取乃一老雄狐腳上帶絳綾香囊放伯裘宋酒泉郡每太守到官無幾輒死後有渤海陳斐見授此郡憂恐不樂就卜者占其吉凶卜者曰遠諸侯放伯裘能解此則無憂斐不解此語答曰君去自當解之斐既到官侍醫有張侯直醫有王侯卒有史侯董侯等斐心悟曰此謂諸侯乃遠之即臥思放伯裘之義不知何謂至夜半後有物來斐被上斐覺以被冒取之物遂跳踉訇訇作聲外人聞持火入欲殺之魅乃言曰我實無惡意但欲試府君耳能一相赦當深報君恩斐曰汝為何物而忽干犯太守魅曰我本千歲狐也今變為魅垂化為神而正觸府君威怒甚遭困厄我字伯裘若府君有急難但呼我字便當自解斐乃喜曰真放伯裘之義也即便放之小開被忽然有光赤如電從戶出明夜有敲門者斐問是誰答曰伯裘問來何為答曰白事問曰何事答曰北界有賊奴發也斐按發則驗每事先以語斐于是境界無毫髮之奸而咸曰聖府君後經月餘主簿李音共斐侍婢私通既而懼為伯裘所白遂與諸侯謀殺斐伺傍無人便與諸侯持杖直入欲格殺之斐惶怖即呼伯裘救我即有物如伸一疋絳割然作聲音侯伏地失魂乃以次縛取考詢皆服云斐未到官音已懼失權與諸侯謀殺斐會諸侯見斥事不成裴即殺音等伯裘乃謝裴曰未及白音姦情乃為府君所召雖效微力猶用慚惶後月餘與斐辭曰今後當上天去不得復與府君相往來也遂去不見
