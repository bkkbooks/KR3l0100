body:
  text: 卷六陳阿登漢時會稽句章人至東野還暮不及至家見路旁小屋燃火因投宿止有一少女不欲與丈夫共宿呼鄰人家女自伴夜共彈空篌問其姓名女不答彈弦而歌曰連綿葛上藤一綏復一絙欲知我姓名姓陳名阿登明至東郭外有賣食母在肆中此人寄坐因說昨所見母聞阿登驚曰此是我女近亡葬于郭外張姑子漢時諸暨縣吏吳詳者憚役委頓將投竄深山行至一溪日欲暮見年少女子來衣甚端正女曰我一身獨居又無鄰里唯有一孤嫗相去十余步爾詳聞甚悅便即隨去行一里余即至女家家甚貧陋為詳設食至一更竟忽聞一嫗喚云張姑子女應曰諾詳問是誰答云向所道孤獨嫗也二人共寢息至曉雞鳴詳去二情相戀女以紫手巾贈祥詳以布手巾報之行至昨所應處過溪其夜大水暴溢深不可涉乃回向女家都不見昨處但有一冢爾箏笛浦官船廬江箏笛浦浦有大舶覆在水中云是曹公舶船嘗有漁人夜宿其旁以船繫之但聞箏笛弦節之聲及香氣氤氳漁人又夢人驅遣云勿近官船此人驚覺即移船去相傳云曹公載數妓船覆于此今猶存焉崔少府盧充獵見獐便射中之隨逐不覺遠忽見一里門如府舍問鈴下鈴下對曰崔少府府也進見少府少府語充曰尊府君為索小女婚故相迎耳三日婚畢以車送充至家母問之具以狀對既與崔別後四年之三月三日充臨水戲遙見水邊有犢車乃往開車戶見崔女與三歲兒共載情意如初抱兒還充水與金鋺而別魯子敬墓王伯陽家在京口宅東有大冢相傳云是魯肅墓伯陽婦郗鑑兄女也喪亡王平其冢以葬後數年伯陽白日在廳事忽見一貴人乘平肩輿與侍從數百人馬皆浴鐵徑來坐謂伯陽曰我是魯子敬安冢在此二百許年君何故毀壞吾冢因顧左右何不舉手左右牽伯陽下床乃以刀環擊之數百而去登時絕死良久復蘇被擊處皆發疽潰尋便死一說王伯陽亡其子營墓得一漆棺移至南岡夜夢肅怒云當殺汝父尋復夢見伯陽云魯肅與吾爭墓若不如我不復得還後於靈座褥上見血數疑魯肅之故也墓今在長廣橋東一里承儉承儉者東莞人病亡葬本縣界後十年忽夜與其縣令夢云沒故民承儉人今見劫明府急見救令便敕內外裝束作百人仗便令馳馬往冢上日已向出天忽大霧對面不相見但聞冢中㕳㕳破棺聲有二人墳上望霧暝不見人往令既至百人同聲大叫收得冢中三人墳上二人遂得逃走棺未壞令即使人修復之其夜令又夢儉云二人雖得走民悉誌之一人面上有青誌如藿葉一人斷其前兩齒折明府但案此尋覓自得也令從其言追捕並擒獲上虞人荊州刺史殷仲堪布衣時在丹徒忽夢見一人自說己是上虞人死亡浮喪飄流江中明日當至君有濟物之仁豈能見移著高燥處則恩及枯骨矣殷明日與諸人共江上看見一棺逐水流下飄飄至殷坐處即令人牽取題如所夢即移著岡上酹以酒飯是夕又夢此人來謝恩韓冢人晉升平中徐州刺史索遜乘船往晉陵會暗發廻河行數里有人求索寄載云我家在韓冢腳痛不能行寄君船去四更時至韓冢此人便去遜遣人牽船過一渡施力殊不便罵此人曰我數里載汝來徑去不與人牽船欲與痛手此人便還與牽不覺用力而得渡人便徑入諸冢間遜疑非人使竊尋看此人經冢間便不復見須臾復出至一冢呼曰載公有出應者此人云我向載人船來不與共牽奴便欲打我今當往報之欲暫借甘羅來載公曰壞我甘羅不可得此人云無所苦我試之耳遜聞此即還船須臾岸上有物來赤如百斛龠長二丈許徑來向船遜便大呼奴載我船不與我牽不得痛手方便載公甘羅今欲擊我今日即打壞奴甘羅言訖忽然便失於是遂進四人捉馬晉元熙中上黨馮述為相府吏將假歸虎牢忽逢四人各持繩及杖來赴述述策馬避馬不肯進四人各捉馬一足倏然便到河上問述欲渡否述曰水深不測既無舟楫如何得渡君正欲見殺爾四人云不相殺當持君赴官遂復捉馬腳涉河而北述但聞波浪聲而不覺水垂至岸四人相謂曰此人不淨那得將去時述有弟喪服深恐鬼離之便當溺水死乃鞭馬作勢徑得登岸述辭謝曰既蒙恩德何敢復煩勞異物如鳥安豐侯王戎字濬沖琅邪臨沂人也嘗赴人家殯殮主人治棺未竟送者悉入廳事上安豐作車中臥忽見空中有一異物如鳥熟視轉大漸近見一乘赤馬車一人在中著幘赤衣手持一斧至地下車徑入王車中廻几容之謂王曰君神明清照物無隱情亦有事故來相從然當為君一言凡人家殯殮葬送苟非至親不可急往良不獲已可乘赤車令髯奴御之及乘白馬則可禳之因謂戎君當致位三公語良久主人內棺當殯眾客悉入此鬼亦入既入戶鬼便持斧行棺牆上有一親趨棺欲與亡人訣鬼便以斧正打其額即倒地左右扶出鬼于棺上視戎而笑眾悉見鬼持斧而出腹中鬼李子豫少善醫方當代稱其通靈許永為豫州刺史鎮歷陽其弟得病心腹疼痛十餘年殆死忽一夜聞屏風後有鬼謂腹中鬼曰何不速殺之不然李子豫當從此過以赤丸打汝汝其死矣腹中鬼對曰吾不畏之及旦許永遂使人候子豫果來未入門病者自聞中有呻吟聲及子豫入視曰鬼病也遂於巾箱中出八毒赤丸子與服之須臾腹中雷鳴鼓轉大利數行遂差今八毒丸方是也盛道兒宋元嘉十四年廣陵盛道兒亡托孤女於婦弟申翼之服闋翼之以其女嫁北鄉嚴齊息寒門也豐其禮賂始成婚道兒忽空中怒曰吾喘唾之氣舉門戶相托如何昧利忘義結婚微族翼之乃大惶愧歷陽神祠晉淮南胡茂回能見鬼雖不喜見而不可止後行至揚州還歷陽城東有神祠中正值民將巫祝祀之至須臾頃有群鬼相叱曰上官來各迸走出祠去廻顧見二沙門來入祠中諸鬼兩兩三三相抱持在祠邊草中伺望望見沙門皆有怖懼須臾二沙門去後諸鬼皆還祠中回於是信佛遂精誠奉事鬼設網有一傖小兒放牛野中伴輩數人見一鬼依諸叢草間處處設網欲以捕人設網後未竟傖小兒竊取前網仍以罨捕即縛得鬼懊惱歌廬江杜謙為諸暨令縣西山下有一鬼長三丈著赭衣褲穿褶在草中拍張又脫褶擲草上作懊惱歌百姓皆看之朱弼會稽朱弼為國郎中令營立第舍未成而卒同郡謝子木代其事以弼死亡乃簿書多張功賞長百餘萬以其贓誣弼而實自入子木夜寢忽聞有人道弼姓字者俄頃而到子木堂前謂之曰卿以枯骨腐專可得誣當以某日夜更與對証言終忽然不見誤中鬼腳夏侯綜為安西參軍常見鬼騎馬滿道與人無異嘗與人載行忽牽人語指道上有一小兒云此兒正須大病須臾此兒果病殆死其母聞之詰綜綜云無他此兒於于道中擲塗誤中一鬼腳鬼怒故病汝兒爾得以酒飯遺鬼即差母如言而愈范堅之妻順陽范啟母喪當葬前母墓在順陽往視之既至而墳壠雜沓難可識別不知何許袁彥仁時為豫州往看之因云聞有一人見鬼范即如言令物色覓之比至云墓中一人衣服顏狀如此即開墓棺物皆爛冢中灰壤深尺餘意甚疑之試令人以足撥灰中土冀得舊物果得一磚銘云范堅之妻然後信之竺法師沙門竺法師會稽人也與北中郎王坦之周旋甚厚每共論死生罪福報應之事茫昧難明因便共要若有先死者當相報語後經年王于廟中忽見法師來日貧道以某月日命故罪福皆不虛應若影響檀越惟當勤修道德以升躋神明耳先與君要先死者相報故來相語言訖忽然不見坦之尋之亦卒白布衫鬼樂安劉池苟家在夏口忽有一鬼來住劉家初因闇彷佛見形如人著白布袴自甭後數日一來不復隱形便不去喜偷食不以為患然且難之初不敢呵罵吉翼子者強梁不信鬼至劉家謂主人曰卿家鬼何在喚來今為卿罵之即聞屋梁作聲時大有客共仰視便紛紜擲一物下正著翼子面視之乃主人家婦女褻衣惡猶著焉眾共大笑為樂吉大慚洗面而去有人語劉此鬼偷食乃食盡必有形之物可以毒藥中之劉即于他家煮冶葛取二升汁密齎還家向夜舉家作粥糜食餘一甌因瀉葛汁著中置于几上以盆覆之人定後聞鬼從外來發盆啖糜既訖便擲破甌走去須臾間在屋頭吐嗔怒非常便棒打窗戶劉先已防備與鬭亦不敢入至四更然後遂絕
