body:
  text: 搜神後記卷四晉陶潛撰晉時東平馮孝將為廣州太守兒名馬子年二十餘獨卧廐中夜夢見一女子年十八九言我是前太守北海徐𤣥方女不幸早亾亾來今已四年為鬼所枉殺案生録當八十餘聼我更生要當有依馬子乃得生活又應為君妻能從所委見救活不馬子答曰可爾乃與馬子尅期當出至期日牀前地頭髪正與地平令人掃去則愈分明始悟是所夢見者遂屏除左右人便漸漸額出次頭面出又次肩項形體頓出馬子便令坐對榻上陳設語言竒妙非常遂與馬子寢息每誡云我尚虚爾即問何時得出答曰出當得本命生日尚未至遂往廐中言語聲音人皆聞之女計生日至乃具教馬子出已養之方法語畢辭去馬子從其言至日以丹雄雞一隻黍飯一盤清酒一升醊其喪前去廐十餘步祭訖掘棺出開視女身體貎全如故徐徐抱出著氊帳中唯心下微煖口有氣息令婢四人守養䕶之常以青羊乳汁瀝其兩眼漸漸能開口能咽粥既而能語二百日中持杖起行一期之後顔色肌膚氣力悉復如常乃遣報徐氏上下盡來選吉日下禮聘為夫婦生二兒一女長男字元慶永嘉初為秘書郎中小男字敬度作太傳掾女適濟南劉子彦徴士延世之孫云干寶字令升其先新蔡人父瑩有嬖妾母至妬寶父葬時因生推婢著藏中寶兄弟年小不之審也經十年而母喪開墓見其妾伏棺上衣服如生就視猶煖漸漸有氣息輿還家終日而蘇云寶父常致飲食與之寢接恩情如生家中吉凶輙語之校之悉騐平復數年後方卒寶兄嘗病氣絶積日不冷後遂寤云見天地間鬼神事如夢覺不自知死晉太元中北地人陳良與沛國劉舒友善又與同郡李焉共為商賈後大得利焉殺良取物死十許日良忽蘇活得歸家説死時見友人劉舒舒久已亾謂良曰去年春社日祠祀家中鬬争吾實忿之作一兕於庭前卿歸豈能為我説此耶良故往報舒家其怪亦絶乃詣官疏李焉而伏罪襄陽李除中時氣死其父守尸至於三更崛然起坐搏婦臂上金釧甚遽父因助脱既手執之還死婦伺察之至曉心中更煖漸漸得蘇既活云為吏將去比伴甚多見有行貨得免者乃許吏金釧吏令還故歸取以與吏吏得釧便放令還見吏取釧去後數日不知猶在婦衣内婦不敢復著依事呪埋鄭茂病亾殯殮訖未得葬忽然婦及家人夢茂云己未應死偶悶絶爾可開棺出我燒車釭以熨頭頂如言乃活晉時武都太守李仲文在都喪女年十八權假塟郡城北有張世之代為郡世之男字子長年二十侍從在廐中夜夢一女年可十七八顔色不常自言前府君女不幸早亾㑹今當更生心相愛樂故來相就如此五六夕忽然晝見衣服薫香殊絶遂為夫妻寢息衣皆有汚如䖏女焉後仲文遣婢視女墓因過世之婦相聞入廐中見此女一隻履在子長牀下取之啼泣呼言發塜持履歸以示仲文仲文驚愕遣問世之君兒何由得亾女履耶世之呼問兒具道本末李張並謂可怪發棺視之女體已生肉姿顔如故右脚有履左脚無也自爾之後遂死肉爛不得生萬恨之心當復何言涕泣而别魏時尋陽縣北山中蠻人有術能使人化作虎毛色爪牙悉如真虎鄉人鄉字上一多餘字周眕有一奴使入山伐薪奴有婦及妹亦與俱行既至山奴語二人云汝且上髙𣗳視我所為如其言既而入草須臾見一大黄斑虎從草中出奮迅吼喚甚可畏怖二人大駭良乆還草中少時復還為人語二人云歸家慎勿道後遂向等輩説之周尋復之乃以醇酒飲之令熱醉使人解其衣服及身體事事詳悉了無他異唯於髻髪中得一紙畫作大虎虎邊有符周宻取録之奴既醒喚問之見事已露遂具説本末云先嘗於蠻中告糴有蠻師云有此術乃以三尺布數升米并一赤雄雞一升酒授得此法搜神後記卷四
