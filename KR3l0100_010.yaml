body:
  text: 卷十蛟子長沙有人忘其姓名家住江邊有女子渚次浣衣覺身中有異後不以為患遂妊身生三物皆如鮧魚女以己所生甚憐異之乃著澡盤水中養之經三月此物遂大乃是蛟子各有字大者為當洪次者為破阻小者為撲岸天暴雨水三蛟一時俱去遂失所在後天欲雨此物輒來女亦知其當來便出望之蛟子亦舉頭望母良久方去經年後女亡三蛟子一時俱至墓所哭之經日乃去聞其哭聲狀如狗嗥蛟庇舍安城平都縣尹氏居在郡東十里日黃村尹佃舍在焉元嘉二十三年六月中尹兒年十三守舍見一人年可二十許騎白馬張繖及從者四人衣並黃色從東方而來至門呼尹兒來暫寄息因入舍中庭下坐床一人捉繖覆之尹兒看其衣悉無縫馬五色斑似鱗甲而無毛有頃雨氣至此人上馬去回顧尹兒曰明日當更來尹兒觀其去西行躡虛而漸升須臾云氣四合白晝為之晦暝明日大水暴出山谷沸涌丘壑渺漫將淹尹舍忽見大蛟長三丈餘盤屈庇其舍焉虬塘武昌虯山有龍穴居人每見虯飛翔出入歲旱禱之即雨後人築塘其下曰虬塘斫雷公吳興人章苟者五月中於田中耕以飯置菰里每晚取食飯亦已盡如此非一後伺之見一大蛇偷食苟遂以鈠斫之蛇便走去苟逐之至一坂有穴便入穴但聞啼聲云斫傷我某甲或言當何如或云付雷公令霹靂殺奴須臾云雨冥合霹靂覆苟上苟乃跳梁大罵曰天使我貧窮展力耕懇蛇來偷食罪當在蛇反更霹靂我耶乃無知雷公也雷公若來吾當以鈠斫汝腹須臾雲雨漸散轉霹靂向蛇穴中蛇死者數十烏衣人吳末臨海人入山射獵為舍住夜中有一人長一丈著黃衣白帶徑來謂射人曰我有讎克明日當戰君可見助當厚相報射人曰自可助君耳何用謝為答曰明日食時君可出溪邊敵從北來我南往應白帶者我黃帶者彼射人許之明出果聞岸北有聲狀如風雨草木四靡視南亦爾唯見二大蛇長十餘丈於溪中相遇便相盤繞白蛇勢弱射人因引弩射之黃蛇即死日將暮復見昨人來辭謝云住此一年獵明年以去慎勿復來來必為禍射人曰善遂停一年獵所獲甚多驟至巨富數年後忽憶先所獲多乃忘前言復更往獵見先白帶人告曰我語君勿復更來不能見用讎子已大今必報君非我所知射人聞之甚怖便欲走乃見三烏衣人皆長八尺俱張口向之射人即死蛇銜卵元嘉中廣州有三人共入山中伐木忽見石窠中有二卵大如升取煮之湯始熱便聞林中如風雨聲須臾有一蛇大十圍長四五丈徑來于湯中銜卵去三人無幾皆死女嫁蛇晉太元中有士人嫁女於近村者至時夫家遣人來迎女女家別遣發又令女乳母送之既至重車纍閣擬于王侯廊柱下有燈火一婢子嚴妝直守後房帷帳甚美至夜女抱乳母涕泣而口不得言乳母密于帳中以手潛摸之得一蛇如數圍柱纏其女從足至頭乳母驚走出外柱下守燈婢子悉是小蛇燈火乃是蛇眼放龜晉咸康中豫州刺史毛寶戍邾城有一軍人於武昌市見人賣一白龜子長四五寸潔白可愛便買取持歸著甕中養之七日漸大近欲尺許其人憐之持至江邊放江水中視其去後邾城遭石季龍攻陷毛寶棄豫州赴江者莫不沉溺于時所養龜人被鎧持刀亦同自投既入水中覺如墮一石上水裁至腰須臾游出中流視之乃是先所放白龜甲六七尺既抵東岸出頭視此人徐遊而去中江猶回首視此人而沒
